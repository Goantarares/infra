version: '3.8'

services:

  # ----------------------------------------------------------
  # PostgreSQL — constrâns pe manager
  # Datele persistente trebuie să stea pe același nod mereu
  # ----------------------------------------------------------
  postgres:
    image: goantarares/flights-postgres:latest
    environment:
      POSTGRES_DB:       flightsdb
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - db-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager    # rulează doar pe manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3


  # ----------------------------------------------------------
  # Adminer — utilitar DB, pe manager
  # ----------------------------------------------------------
  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    networks:
      - db-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure


  # ----------------------------------------------------------
  # IO Service — pe worker1
  # Singurul serviciu cu acces la DB
  # ----------------------------------------------------------
  io-service:
    image: goantarares/io-service:latest
    environment:
      PORT:            3002
      DB_HOST:         postgres
      DB_PORT:         5432
      DB_NAME:         flightsdb
      DB_USER:         postgres
      DB_PASSWORD:     postgres
      INTERNAL_SECRET: un_secret_lung_si_random
    networks:
      - db-network
      - internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
     # rulează pe un worker
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5


  # ----------------------------------------------------------
  # Auth Service — pe worker1 sau worker2
  # ----------------------------------------------------------
  auth-service:
    image: goantarares/auth-service:latest
    environment:
      PORT:            3001
      JWT_SECRET:      un_secret_lung_si_random
      JWT_EXPIRES_IN:  24h
      IO_SERVICE_URL:  http://io-service:3002
      INTERNAL_SECRET: un_secret_lung_si_random
    ports:
      - "3001:3001"
    networks:
      - internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5


  # ----------------------------------------------------------
  # Business Logic Service — pe worker2
  # ----------------------------------------------------------
  business-logic-service:
    image: goantarares/business-logic-service:latest
    environment:
      PORT:            3003
      IO_SERVICE_URL:  http://io-service:3002
      INTERNAL_SECRET: un_secret_lung_si_random
      JWT_SECRET:      un_secret_lung_si_random
    ports:
      - "3003:3003"
    networks:
      - internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5


  # ----------------------------------------------------------
  # KONG
  # ----------------------------------------------------------
  kong:
    image: kong:3.4
    environment:
      KONG_DATABASE:           "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG:   /dev/stdout
      KONG_ADMIN_ACCESS_LOG:   /dev/stdout
      KONG_PROXY_ERROR_LOG:    /dev/stderr
      KONG_ADMIN_ERROR_LOG:    /dev/stderr
      KONG_ADMIN_LISTEN:       0.0.0.0:8001
    ports:
      - "8000:8000"
      - "8001:8001"
    configs:
      - source: kong-config
        target: /kong/kong.yml
    networks:
      - internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure


  # ----------------------------------------------------------
  # Portainer — UI pentru managementul clusterului
  # Trebuie pe manager și are nevoie de acces la Docker socket
  # ----------------------------------------------------------
  portainer:
    image: portainer/portainer-ce:latest
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    networks:
      - internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager    # trebuie pe manager, are nevoie de socket
      restart_policy:
        condition: on-failure


networks:
  db-network:
    driver: overlay       # overlay în loc de bridge — funcționează între noduri
    attachable: true      # permite containerelor standalone să se atașeze

  internal:
    driver: overlay
    attachable: true


volumes:
  postgres-data:
    driver: local
  portainer-data:
    driver: local
    
configs:
  kong-config:
    file: ./kong/kong.yml